name: Build

on:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-24.04
            arch: x64
            cmake_url: https://github.com/Kitware/CMake/releases/download/v4.3.2/cmake-4.3.2-linux-x86_64.sh
            artifact: telegram-bot-api-Linux-x64
          - name: Linux arm64
            os: ubuntu-24.04-arm
            arch: arm64
            cmake_url: https://github.com/Kitware/CMake/releases/download/v4.3.2/cmake-4.3.2-linux-aarch64.sh
            artifact: telegram-bot-api-Linux-arm64
          - name: macOS arm64
            os: macos-latest
            arch: arm64
            artifact: telegram-bot-api-macOS-arm64
          - name: Windows x64
            os: windows-2025
            arch: x64
            artifact: telegram-bot-api-Windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ---- Ubuntu: latest Clang (LLVM 21) + latest CMake (4.3.2) ----
      - name: Install LLVM 21 (clang + lld)
        if: runner.os == 'Linux'
        run: |
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21
          sudo apt-get install -y lld-21

      - name: Install latest CMake (4.3.2)
        if: runner.os == 'Linux'
        run: |
          wget -q "${{ matrix.cmake_url }}" -O /tmp/cmake-install.sh
          sudo sh /tmp/cmake-install.sh --skip-license --prefix=/usr/local
          cmake --version

      - name: Install remaining Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y make git zlib1g-dev libssl-dev gperf

      # ---- macOS: brew (always latest) ----
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install --quiet gperf cmake openssl

      - name: Set macOS OpenSSL path
        id: openssl
        if: runner.os == 'macOS'
        run: echo "root_dir=/opt/homebrew/opt/openssl" >> "$GITHUB_OUTPUT"

      # ---- Windows: vcpkg (latest from microsoft/vcpkg) ----
      - name: Install vcpkg dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          .\bootstrap-vcpkg.bat
          .\vcpkg.exe install gperf:x64-windows openssl:x64-windows zlib:x64-windows

      # ---- Build (Linux) ----
      - name: Configure and build (Linux)
        if: runner.os == 'Linux'
        run: |
          INSTALL_PREFIX="${{ github.workspace }}/install"
          rm -rf build
          mkdir build && cd build

          cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DTELEGRAM_BOT_API_ENABLE_LTO=ON \
            -DCMAKE_C_COMPILER=clang-21 \
            -DCMAKE_CXX_COMPILER=clang++-21 \
            -DCMAKE_CXX_FLAGS="-march=native -mtune=native" \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libstdc++ -static-libgcc" \
            "-DCMAKE_INSTALL_PREFIX:PATH=${INSTALL_PREFIX}" \
            ..

          cmake --build . --target install -j "$(nproc)"

      # ---- Build (macOS) ----
      - name: Configure and build (macOS)
        if: runner.os == 'macOS'
        run: |
          INSTALL_PREFIX="${{ github.workspace }}/install"
          rm -rf build
          mkdir build && cd build

          cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DTELEGRAM_BOT_API_ENABLE_LTO=ON \
            -DCMAKE_CXX_FLAGS="-march=native -mtune=native" \
            "-DOPENSSL_ROOT_DIR=${{ steps.openssl.outputs.root_dir }}" \
            "-DCMAKE_INSTALL_PREFIX:PATH=${INSTALL_PREFIX}" \
            ..

          cmake --build . --target install -j "$(sysctl -n hw.ncpu)"

      # ---- Build (Windows) ----
      - name: Configure and build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installPrefix = "${{ github.workspace }}\install"
          Remove-Item build -Force -Recurse -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path build | Out-Null
          Set-Location build

          cmake -A x64 `
            -DTELEGRAM_BOT_API_ENABLE_LTO=ON `
            "-DCMAKE_TOOLCHAIN_FILE:FILEPATH=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            "-DCMAKE_INSTALL_PREFIX:PATH=$installPrefix" `
            ..

          cmake --build . --target install --config Release

      # ---- Upload ----
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: install/bin/*
