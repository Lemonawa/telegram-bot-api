name: Build

on:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-24.04
            arch: x64
            artifact: telegram-bot-api-Linux-x64
          - name: Linux arm64
            os: ubuntu-24.04-arm
            arch: arm64
            artifact: telegram-bot-api-Linux-arm64
          - name: macOS arm64
            os: macos-latest
            arch: arm64
            artifact: telegram-bot-api-macOS-arm64
          - name: Windows x64
            os: windows-2025
            arch: x64
            artifact: telegram-bot-api-Windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ---- Linux: clang-18 + libc++ (recommended by build.html for best performance) ----
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make git zlib1g-dev libssl-dev gperf cmake \
            clang-18 libc++-18-dev libc++abi-18-dev lld-18

      # ---- macOS: brew latest ----
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install --quiet gperf cmake openssl

      - name: Set macOS OpenSSL path
        id: openssl
        if: runner.os == 'macOS'
        run: echo "root_dir=/opt/homebrew/opt/openssl" >> "$GITHUB_OUTPUT"

      # ---- Windows: vcpkg (canonical microsoft/vcpkg) ----
      - name: Install vcpkg dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          .\bootstrap-vcpkg.bat
          .\vcpkg.exe install gperf:x64-windows openssl:x64-windows zlib:x64-windows

      # ---- Linux / macOS: Release + LTO + native CPU tuning + clang ----
      - name: Configure and build (Linux)
        if: runner.os == 'Linux'
        run: |
          INSTALL_PREFIX="${{ github.workspace }}/install"
          rm -rf build
          mkdir build && cd build

          cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DTELEGRAM_BOT_API_ENABLE_LTO=ON \
            -DCMAKE_C_COMPILER=clang-18 \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++ -march=native -mtune=native" \
            "-DCMAKE_INSTALL_PREFIX:PATH=${INSTALL_PREFIX}" \
            ..

          cmake --build . --target install -j "$(nproc)"

      - name: Configure and build (macOS)
        if: runner.os == 'macOS'
        run: |
          INSTALL_PREFIX="${{ github.workspace }}/install"
          rm -rf build
          mkdir build && cd build

          cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DTELEGRAM_BOT_API_ENABLE_LTO=ON \
            -DCMAKE_CXX_FLAGS="-march=native -mtune=native" \
            "-DOPENSSL_ROOT_DIR=${{ steps.openssl.outputs.root_dir }}" \
            "-DCMAKE_INSTALL_PREFIX:PATH=${INSTALL_PREFIX}" \
            ..

          cmake --build . --target install -j "$(sysctl -n hw.ncpu)"

      # ---- Windows: MSVC Release + LTO ----
      - name: Configure and build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installPrefix = "${{ github.workspace }}\install"
          Remove-Item build -Force -Recurse -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path build | Out-Null
          Set-Location build

          cmake -A x64 `
            -DTELEGRAM_BOT_API_ENABLE_LTO=ON `
            "-DCMAKE_TOOLCHAIN_FILE:FILEPATH=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            "-DCMAKE_INSTALL_PREFIX:PATH=$installPrefix" `
            ..

          cmake --build . --target install --config Release

      # ---- Upload ----
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: install/bin/*
